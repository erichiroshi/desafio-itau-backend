spring:
  application:
    name: desafio-itau

app:
  estatistica:
    janela-segundos: 120

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.erichiroshi: DEBUG