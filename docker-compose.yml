services:
  desafio-itau:
    build: .
    container_name: desafio-itau
    ports:
      - "8080:8080"
    # Limites de recursos alinhados com o MaxRAMPercentage=75,0 do Java
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health/readiness" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
